<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restock Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e4e4e7; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #5865F2; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-title { font-size: 15px; font-weight: 600; color: #111; white-space: nowrap; }
  .header-user { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logout { font-size: 12px; color: #888; text-decoration: none; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; white-space: nowrap; }
  .locations-btn { display: none; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #5865F2; background: #f0f1ff; border: 1px solid #c7caff; border-radius: 6px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .locations-btn-dot { width: 7px; height: 7px; border-radius: 50%; background: #5865F2; flex-shrink: 0; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; }
  .overlay.visible { display: block; }

  .sidebar { width: 240px; flex-shrink: 0; background: #fff; border-right: 1px solid #e4e4e7; display: flex; flex-direction: column; height: calc(100vh - 51px); position: sticky; top: 51px; overflow: hidden; }
  .sidebar-header { padding: 10px 14px 8px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .sidebar-title { font-size: 12px; font-weight: 600; color: #111; }
  .sidebar-actions { display: flex; gap: 8px; align-items: center; }
  .sidebar-action { font-size: 11px; color: #5865F2; cursor: pointer; background: none; border: none; padding: 0; }
  .sidebar-action:hover { text-decoration: underline; }
  .sidebar-close { display: none; font-size: 18px; color: #888; background: none; border: none; cursor: pointer; padding: 0 0 0 8px; line-height: 1; }
  .sidebar-body { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-footer { padding: 10px 14px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .save-prefs-btn { width: 100%; height: 32px; background: #5865F2; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .save-prefs-btn:disabled { opacity: 0.7; cursor: not-allowed; }

  .store-group { margin-bottom: 2px; }
  .store-group-toggle { display: flex; align-items: center; gap: 6px; padding: 7px 14px; cursor: pointer; font-size: 11px; font-weight: 700; color: #111; letter-spacing: 0.03em; user-select: none; background: none; border: none; width: 100%; text-align: left; }
  .store-group-toggle:hover { background: #f9f9f9; }
  .sg-chevron { font-size: 9px; color: #aaa; transition: transform 0.15s; flex-shrink: 0; }
  .sg-chevron.open { transform: rotate(90deg); }
  .sg-count { font-size: 10px; color: #aaa; font-weight: 400; margin-left: auto; }
  .sg-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .sg-btn { font-size: 10px; color: #5865F2; background: none; border: none; cursor: pointer; padding: 0 2px; font-weight: 600; }
  .sg-btn:hover { text-decoration: underline; }
  .store-group-items { padding: 0 0 4px 0; }
  .loc-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px 5px 28px; font-size: 12px; color: #333; }
  .loc-item input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: #5865F2; flex-shrink: 0; }
  .loc-link { color: #333; text-decoration: none; flex: 1; line-height: 1.4; }
  .loc-link.has-link { color: #5865F2; }
  .loc-link.has-link:hover { text-decoration: underline; }

  .body-wrap { display: flex; align-items: flex-start; }
  .main { flex: 1; padding: 16px; min-width: 0; }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 12px 14px; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .controls label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .btn-group { display: flex; }
  .btn-group button { font-size: 12px; height: 30px; padding: 0 11px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; transition: background 0.1s; white-space: nowrap; }
  .btn-group button:first-child { border-radius: 6px 0 0 6px; }
  .btn-group button:last-child  { border-radius: 0 6px 6px 0; }
  .btn-group button:not(:first-child) { border-left: none; }
  .btn-group button.active { background: #5865F2; color: #fff; border-color: #5865F2; }
  .ctrl-divider { width: 100%; height: 1px; background: #f0f0f0; }
  .loading-msg { font-size: 12px; color: #888; }

  .slider-wrap { display: flex; flex-direction: column; gap: 3px; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row input[type=range] { width: 140px; }
  .slider-label { font-size: 12px; font-weight: 500; color: #111; min-width: 70px; }
  .slider-ticks { display: flex; justify-content: space-between; width: 140px; padding: 0 2px; }
  .slider-tick { font-size: 9px; color: #bbb; }

  .table-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 12px; position: relative; overflow: hidden; }
  .wm-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { border-collapse: collapse; font-size: 11px; }
  .loc-cell { font-size: 11px; white-space: nowrap; padding: 3px 8px 3px 0; text-align: right; min-width: 110px; }
  .loc-name { color: #111; font-weight: 500; }
  .loc-name-link { color: #5865F2; font-weight: 500; text-decoration: none; }
  .loc-name-link:hover { text-decoration: underline; }
  .col-head { font-size: 10px; color: #888; text-align: center; padding: 2px 1px; min-width: 26px; }
  .sub-head { font-size: 9px; color: #aaa; text-align: center; padding: 1px; }
  .cell { width: 26px; height: 22px; text-align: center; vertical-align: middle; cursor: default; font-size: 10px; font-weight: 500; border-radius: 3px; border: 1px solid transparent; }
  .cell:hover { border-color: #999; }
  .day-divider { border-left: 2px solid #d1d5db !important; }
  .total-head { font-size: 10px; color: #888; text-align: center; padding: 2px 6px; }
  .total-cell { font-size: 11px; font-weight: 600; text-align: center; padding: 0 6px; }
  .store-group-header { cursor: pointer; user-select: none; }
  .store-group-header:hover .store-header-inner { background: #f9f9f9; }
  .store-header-inner { display: flex; align-items: center; gap: 8px; padding: 7px 8px 7px 0; border-top: 2px solid #e4e4e7; margin-top: 6px; }
  .store-header-name { font-size: 13px; font-weight: 700; color: #111; }
  .store-header-count { font-size: 11px; color: #999; font-weight: 400; }
  .store-chevron { margin-left: auto; font-size: 11px; color: #aaa; transition: transform 0.2s; display: inline-block; }
  .store-chevron.open { transform: rotate(90deg); }
  .legend { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; color: #888; }
  .legend-swatch { width: 16px; height: 10px; border-radius: 2px; }
  .tip { position: fixed; background: #fff; border: 1px solid #e4e4e7; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #111; pointer-events: none; z-index: 1000; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 260px; line-height: 1.6; }
  .tip-title { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
  .tip-dates { color: #555; font-size: 10px; white-space: pre-line; }
  .empty { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }

  @media (max-width: 768px) {
    .locations-btn { display: flex; }
    .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100vh; z-index: 400; transition: left 0.25s ease; box-shadow: 2px 0 12px rgba(0,0,0,0.1); }
    .sidebar.open { left: 0; }
    .sidebar-close { display: block; }
    .main { padding: 12px; }
    .controls { padding: 10px 12px; gap: 8px; }
    .slider-row input[type=range] { width: 120px; }
    .slider-ticks { width: 120px; }
    .btn-group button { font-size: 11px; height: 28px; padding: 0 9px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="avatar">
      {% if avatar %}
        <img src="https://cdn.discordapp.com/avatars/{{ user_id }}/{{ avatar }}.png" alt="">
      {% else %}
        {{ username[0] | upper }}
      {% endif %}
    </div>
    <div>
      <div class="header-title">Restock Dashboard</div>
      <div class="header-user">{{ username }}</div>
    </div>
  </div>
  <div class="header-right">
  <button class="locations-btn" onclick="toggleSidebar()">
    <span class="locations-btn-dot"></span>Locations
  </button>
  <a href="/map" class="logout">Map</a>
  <a href="/status" class="logout">Status</a>
  <a href="/scan" class="logout">Scan</a>
  {% if is_admin %}<a href="/admin" class="logout">Admin</a>{% endif %}
  {% if is_admin %}<a href="/contributors" class="logout">Contributors</a>{% endif %}
  <a href="/logout" class="logout">Log out</a>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="body-wrap">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Locations</span>
      <div class="sidebar-actions">
        <button class="sidebar-action" onclick="selectAll()">All</button>
        <button class="sidebar-action" onclick="selectNone()">None</button>
        <button class="sidebar-action" onclick="loadSaved()">Saved</button>
        <button class="sidebar-close" onclick="closeSidebar()">&#x2715;</button>
      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <div style="padding:20px;text-align:center;font-size:12px;color:#aaa;">Loading...</div>
    </div>
    <div class="sidebar-footer">
      <button class="save-prefs-btn" id="savePrefsBtn" onclick="savePreferences()">Save Locations</button>
    </div>
  </div>

  <div class="main">
    <div class="controls">
      <div class="ctrl-row">
        <label>Period</label>
        <div class="slider-wrap">
          <div class="slider-row">
            <input type="range" id="periodSlider" min="1" max="8" step="1" value="1" oninput="onSliderChange(this.value)">
            <span class="slider-label" id="periodLabel">This week</span>
          </div>
          <div class="slider-ticks">
            <span class="slider-tick">1w</span><span class="slider-tick">2w</span><span class="slider-tick">3w</span>
            <span class="slider-tick">4w</span><span class="slider-tick">5w</span><span class="slider-tick">6w</span>
            <span class="slider-tick">7w</span><span class="slider-tick">8w</span>
          </div>
        </div>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-row">
        <label>Region</label>
        <div class="btn-group" id="regionBtns">
          <button class="active">Loading…</button>
        </div>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-row">
        <label>Time</label>
        <div class="btn-group">
          <button id="btnSlot" class="active" onclick="setSlot(true,this)">AM / PM / Eve</button>
          <button id="btnDay" onclick="setSlot(false,this)">Day total</button>
        </div>
        <span class="loading-msg" id="loadMsg" style="display:none;">Loading...</span>
      </div>
    </div>

    <div class="table-card" id="tableCard">
      <canvas class="wm-canvas" id="wmCanvas"></canvas>
      <div class="table-scroll">
        <table id="ht"><tr><td class="empty">Loading data...</td></tr></table>
      </div>
    </div>

    <div class="legend">
      <span>None</span>
      <div style="display:flex;gap:2px;" id="legendBar"></div>
      <span>High</span>
    </div>
  </div>
</div>

<div class="tip" id="tip">
  <div class="tip-title" id="tipTitle"></div>
  <div class="tip-dates" id="tipDates"></div>
</div>

<script>
const DISCORD_USERNAME = {{ username | tojson }};

let REGIONS = [];
const SLOTS           = ["Morning","Afternoon","Evening"];
const SLOT_S          = ["AM","PM","Eve"];
const DOW_ORDER       = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const STORE_ORDER     = ["Target","Walmart","Best Buy","5 Below","Barnes and Noble"];
const EXCLUDED_STORES = ["Costco","Sams Club"];
const PERIOD_LABELS   = {
  1:"This week",2:"2 weeks",3:"3 weeks",4:"4 weeks",
  5:"5 weeks",6:"6 weeks",7:"7 weeks",8:"8 weeks"
};

let currentWeeks  = 1;
let currentRegion = 'VA';
let showSlots     = true;
let rawData       = [];
let expandedStores= new Set();
let locationMeta  = {};
let locationList  = [];
let selectedLocs  = new Set();
let sidebarOpen   = {};

function toggleSidebar(){
  const sb=document.getElementById("sidebar"),ov=document.getElementById("overlay");
  if(sb.classList.contains("open")){ closeSidebar(); }
  else { sb.classList.add("open"); ov.classList.add("visible"); }
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("visible");
}

function getHeatColor(val,max){
  if(val===0) return {bg:"#f4f4f5",fg:"#bbb"};
  const t=Math.min(val/max,1);
  let r,g,b;
  if(t<0.5){ const p=t/0.5; r=Math.round(52+p*(230-52)); g=Math.round(168+p*(210-168)); b=Math.round(83+p*(40-83)); }
  else { const p=(t-0.5)/0.5; r=Math.round(230+p*(220-230)); g=Math.round(210+p*(50-210)); b=Math.round(40+p*(50-40)); }
  const br=(r*299+g*587+b*114)/1000;
  return {bg:`rgb(${r},${g},${b})`,fg:br>140?"#111":"#fff"};
}

function getDOW(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  return DOW_ORDER[((d.getDay()+6)%7)];
}

function buildDayList(){
  if(currentWeeks===1){
    const list=[],now=new Date(),monday=new Date(now);
    monday.setDate(now.getDate()-((now.getDay()+6)%7));
    for(let i=0;i<7;i++){
      const d=new Date(monday); d.setDate(monday.getDate()+i);
      if(d>now) break;
      const yy=d.getFullYear(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
      list.push({key:`${yy}-${mm}-${dd}`,label:d.toLocaleDateString("en-US",{weekday:"short"})});
    }
    return list;
  }
  return DOW_ORDER.map(d=>({key:d,label:d}));
}

function aggregateData(){
  const dayList=buildDayList();
  const locs={};


  if(currentWeeks===1){
    const dayKeys=new Set(dayList.map(d=>d.key));
    rawData.forEach(row=>{
      if(!dayKeys.has(row.date)||row.region!==currentRegion||EXCLUDED_STORES.includes(row.store)||!selectedLocs.has(`${row.store}||${row.location}`)) return;
      const k=`${row.location}||${row.store}`;
      if(!locs[k]) locs[k]={location:row.location,store:row.store,region:row.region,days:{}};
      if(!locs[k].days[row.date]) locs[k].days[row.date]={Morning:[],Afternoon:[],Evening:[]};
      locs[k].days[row.date][row.slot].push(row.datetime);
    });
  } else {
    rawData.forEach(row=>{
      if(row.region!==currentRegion||EXCLUDED_STORES.includes(row.store)||!selectedLocs.has(`${row.store}||${row.location}`)) return;
      const dow=getDOW(row.date);
      const k=`${row.location}||${row.store}`;
      if(!locs[k]) locs[k]={location:row.location,store:row.store,region:row.region,days:{}};
      if(!locs[k].days[dow]) locs[k].days[dow]={Morning:[],Afternoon:[],Evening:[]};
      locs[k].days[dow][row.slot].push(row.datetime);
    });
  }
  return {dayList,locs:Object.values(locs).sort((a,b)=>{
    const oa=STORE_ORDER.indexOf(a.store)===-1?999:STORE_ORDER.indexOf(a.store);
    const ob=STORE_ORDER.indexOf(b.store)===-1?999:STORE_ORDER.indexOf(b.store);
    return oa!==ob?oa-ob:a.location.localeCompare(b.location);
  })};
}

function onSliderChange(val){
  currentWeeks=parseInt(val);
  document.getElementById("periodLabel").textContent=PERIOD_LABELS[currentWeeks];
  fetchData();
}

async function loadLocations(){
  try {
    const [locResp, prefResp] = await Promise.all([
      fetch(`/api/locations?region=${currentRegion}`),
      fetch(`/api/preferences?region=${currentRegion}`)
    ]);
    const data = await locResp.json();
    const pref = await prefResp.json();

    locationMeta={};
    data.forEach(d=>{ locationMeta[`${d.store}||${d.location}`]={store:d.store,location:d.location,link:d.link}; });

    if (pref.found) {
      selectedLocs = new Set(pref.selected);
    } else {
      // No saved prefs yet — default to none checked
      selectedLocs = new Set();
    }

    // Default all store groups to collapsed unless user has toggled them
    data.forEach(d=>{ if(!(d.store in sidebarOpen)) sidebarOpen[d.store]=false; });

    locationList=[...data].sort((a,b)=>{
      const oa=STORE_ORDER.indexOf(a.store)===-1?999:STORE_ORDER.indexOf(a.store);
      const ob=STORE_ORDER.indexOf(b.store)===-1?999:STORE_ORDER.indexOf(b.store);
      return oa!==ob?oa-ob:a.location.localeCompare(b.location);
    });
    renderSidebar(locationList);
  } catch(e){
    document.getElementById("sidebarBody").innerHTML='<div style="padding:16px;font-size:12px;color:#aaa;">Failed to load.</div>';
  }
}

function renderSidebar(data){
  const groups={};
  data.forEach(d=>{ if(!EXCLUDED_STORES.includes(d.store)){ if(!groups[d.store]) groups[d.store]=[]; groups[d.store].push(d); }});
  let html='';
  STORE_ORDER.forEach(store=>{
    const items=groups[store];
    if(!items||!items.length) return;
    const isOpen=sidebarOpen[store]===true;
    const checked=items.filter(i=>selectedLocs.has(`${store}||${i.location}`)).length;
    const safeStore=store.replace(/'/g,"\\'");
    html+=`<div class="store-group">
      <button class="store-group-toggle" onclick="toggleSidebarGroup('${safeStore}')">
        <span class="sg-chevron${isOpen?' open':''}">&#9654;</span>${store}
        <span class="sg-count">${checked}/${items.length}</span>
        <span class="sg-actions">
          <button class="sg-btn" onclick="event.stopPropagation();selectStoreAll('${safeStore}')">All</button>
          <button class="sg-btn" onclick="event.stopPropagation();selectStoreNone('${safeStore}')">None</button>
        </span>
      </button>
      <div class="store-group-items" id="sg-${store.replace(/\s/g,'_')}" style="display:${isOpen?'block':'none'}">`;
    items.forEach(item=>{
      const compoundKey=`${store}||${item.location}`;
      const chk=selectedLocs.has(compoundKey);
      const hasLink=item.link&&item.link.trim();
      const lbl=hasLink
        ?`<a class="loc-link has-link" href="${item.link}" target="_blank" rel="noopener">${item.location}</a>`
        :`<span class="loc-link">${item.location}</span>`;
      html+=`<label class="loc-item"><input type="checkbox" ${chk?'checked':''} onchange="toggleLocation('${compoundKey.replace(/'/g,"\\'")}',this.checked)">${lbl}</label>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById("sidebarBody").innerHTML=html;

  // Reset save button state when region/locations reload
  const btn=document.getElementById("savePrefsBtn");
  if(btn){
    btn.textContent="Save Locations";
    btn.style.background="";
    btn.disabled=false;
  }
}

function toggleSidebarGroup(store){
  const el=document.getElementById(`sg-${store.replace(/\s/g,'_')}`);
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  sidebarOpen[store]=!isOpen;  // true = open, false = closed
  renderSidebar(locationList);
}

function toggleLocation(compoundKey,checked){
  if(checked) selectedLocs.add(compoundKey); else selectedLocs.delete(compoundKey);
  document.querySelectorAll('.store-group-toggle').forEach(btn=>{
    const store=btn.childNodes[1]?.textContent?.trim();
    if(!store) return;
    const items=Object.keys(locationMeta).filter(k=>k.startsWith(store+'||'));
    const span=btn.querySelector('.sg-count');
    if(span&&items.length) span.textContent=`${items.filter(k=>selectedLocs.has(k)).length}/${items.length}`;
  });
  render();
}

function selectAll(){
  Object.keys(locationMeta).forEach(k=>selectedLocs.add(k));
  renderSidebar(locationList);
  render();
}

function selectNone(){
  selectedLocs.clear();
  renderSidebar(locationList);
  render();
}

function selectStoreAll(store){
  Object.keys(locationMeta).filter(k=>k.startsWith(store+'||')).forEach(k=>selectedLocs.add(k));
  renderSidebar(locationList);
  render();
}

function selectStoreNone(store){
  Object.keys(locationMeta).filter(k=>k.startsWith(store+'||')).forEach(k=>selectedLocs.delete(k));
  renderSidebar(locationList);
  render();
}

async function loadSaved(){
  try {
    const resp=await fetch(`/api/preferences?region=${currentRegion}`);
    const pref=await resp.json();
    if(pref.found && pref.selected.length){
      selectedLocs=new Set(pref.selected);
    } else {
      selectedLocs=new Set();
    }
    renderSidebar(locationList);
    render();
  } catch(e){
    console.warn("Failed to load saved preferences",e);
  }
}

async function savePreferences(){
  const btn=document.getElementById("savePrefsBtn");
  if(!btn) return;
  btn.disabled=true;
  btn.textContent="Saving...";
  try {
    const resp=await fetch("/api/preferences",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ region:currentRegion, selected:[...selectedLocs] })
    });
    if(!resp.ok) throw new Error("Failed");
    btn.textContent="Saved ✓";
    btn.style.background="#16a34a";
    setTimeout(()=>{
      btn.textContent="Save Locations";
      btn.style.background="";
      btn.disabled=false;
    },2000);
  } catch(e){
    btn.textContent="Error — Try Again";
    btn.style.background="#dc2626";
    setTimeout(()=>{
      btn.textContent="Save Locations";
      btn.style.background="";
      btn.disabled=false;
    },2000);
  }
}

function toggleStore(storeName){
  if(expandedStores.has(storeName)) expandedStores.delete(storeName); else expandedStores.add(storeName);
  render();
}

function render(){
  const {dayList,locs}=aggregateData();
  let maxVal=0;
  locs.forEach(loc=>{ dayList.forEach(({key})=>{
    const d=loc.days[key]||{Morning:[],Afternoon:[],Evening:[]};
    if(showSlots){ SLOTS.forEach(sl=>{ if(d[sl].length>maxVal) maxVal=d[sl].length; }); }
    else { const t=SLOTS.reduce((s,sl)=>s+d[sl].length,0); if(t>maxVal) maxVal=t; }
  });});
  if(maxVal===0) maxVal=1;

  const ht=document.getElementById("ht");
  if(!locs.length){ ht.innerHTML=`<tr><td class="empty">No restocks found — select locations or adjust period.</td></tr>`; drawWatermark(); return; }

  let html="<thead>";
  if(showSlots){
    html+="<tr><th class='loc-cell'></th>";
    dayList.forEach(({label},i)=>{ html+=`<th class='col-head${i>0?" day-divider":""}' colspan='3'>${label}</th>`; });
    html+="<th class='total-head'>Total</th></tr><tr><th class='loc-cell'></th>";
    dayList.forEach((_,i)=>{ SLOT_S.forEach((s,si)=>{ html+=`<th class='sub-head${si===0&&i>0?" day-divider":""}'>${s}</th>`; }); });
    html+="<th></th></tr>";
  } else {
    html+="<tr><th class='loc-cell'></th>";
    dayList.forEach(({label},i)=>{ html+=`<th class='col-head${i>0?" day-divider":""}'>${label}</th>`; });
    html+="<th class='total-head'>Total</th></tr>";
  }
  html+="</thead><tbody>";

  const groups={};
  locs.forEach(loc=>{ if(!groups[loc.store]) groups[loc.store]=[]; groups[loc.store].push(loc); });
  const spanCols=showSlots?dayList.length*3:dayList.length;

  STORE_ORDER.forEach(storeName=>{
    const group=groups[storeName];
    if(!group||!group.length) return;
    const isOpen=expandedStores.has(storeName);
    const totalRestocks=group.reduce((sum,loc)=>sum+dayList.reduce((s,{key})=>{
      const d=loc.days[key]||{Morning:[],Afternoon:[],Evening:[]};
      return s+SLOTS.reduce((ss,sl)=>ss+d[sl].length,0);
    },0),0);

    html+=`<tr class='store-group-header' onclick='toggleStore(${JSON.stringify(storeName)})'>
      <td colspan='${spanCols+2}'><div class='store-header-inner'>
        <span class='store-header-name'>${storeName}</span>
        <span class='store-header-count'>${group.length} loc · ${totalRestocks} restocks</span>
        <span class='store-chevron${isOpen?" open":""}'>&#9654;</span>
      </div></td></tr>`;
    if(!isOpen) return;

    group.forEach(loc=>{
      let rowTotal=0;
      // Find link by location name — case-insensitive + trimmed to handle minor name mismatches
      const locNorm=loc.location.trim().toLowerCase();
      const metaKey=Object.keys(locationMeta).find(k=>k.toLowerCase().endsWith('||'+locNorm));
      const link=metaKey?locationMeta[metaKey].link:null;
      const nameHtml=link
        ?`<a class="loc-name-link" href="${link}" target="_blank" rel="noopener">${loc.location}</a>`
        :`<span class="loc-name">${loc.location}</span>`;
      html+=`<tr><td class='loc-cell'>${nameHtml}</td>`;
      dayList.forEach(({key,label},dayIdx)=>{
        const d=loc.days[key]||{Morning:[],Afternoon:[],Evening:[]};
        if(showSlots){
          SLOTS.forEach((sl,slIdx)=>{
            const times=d[sl],count=times.length; rowTotal+=count;
            const {bg,fg}=getHeatColor(count,maxVal);
            const div=slIdx===0&&dayIdx>0?" day-divider":"";
            const st=`${loc.location} · ${label} ${sl} (${count})`;
            const sd=times.length?times.join("\n"):"No restocks";
            html+=`<td class='cell${div}' style='background:${bg};color:${fg}' data-title="${st.replace(/"/g,'&quot;')}" data-dates="${sd.replace(/"/g,'&quot;')}">${count>0?count:`<span style='opacity:0.3'>·</span>`}</td>`;
          });
        } else {
          const allTimes=SLOTS.flatMap(sl=>d[sl]),count=allTimes.length; rowTotal+=count;
          const {bg,fg}=getHeatColor(count,maxVal);
          const div=dayIdx>0?" day-divider":"";
          const st=`${loc.location} · ${label} (${count})`;
          const sd=allTimes.length?allTimes.join("\n"):"No restocks";
          html+=`<td class='cell${div}' style='background:${bg};color:${fg}' data-title="${st.replace(/"/g,'&quot;')}" data-dates="${sd.replace(/"/g,'&quot;')}">${count>0?count:`<span style='opacity:0.3'>·</span>`}</td>`;
        }
      });
      html+=`<td class='total-cell'>${rowTotal}</td></tr>`;
    });
  });

  html+="</tbody>";
  ht.innerHTML=html;

  ht.querySelectorAll(".cell").forEach(cell=>{
    cell.addEventListener("mouseenter",()=>{
      document.getElementById("tipTitle").textContent=cell.getAttribute("data-title");
      document.getElementById("tipDates").textContent=cell.getAttribute("data-dates");
      document.getElementById("tip").style.display="block";
    });
    cell.addEventListener("mousemove",e=>{
      const tip=document.getElementById("tip"),vw=window.innerWidth;
      let left=e.clientX+14;
      if(left+270>vw) left=e.clientX-284;
      tip.style.left=left+"px";
      tip.style.top=Math.max(8,e.clientY-tip.offsetHeight/2)+"px";
    });
    cell.addEventListener("mouseleave",()=>{ document.getElementById("tip").style.display="none"; });
  });

  document.getElementById("legendBar").innerHTML=
    ["#f4f4f5","#34a853","#6dbf4a","#b5d940","#e6c832","#e68220","#dc3232"]
    .map((c,i)=>`<div class='legend-swatch' style='background:${c};${i===0?"border:1px solid #e4e4e7":""}'></div>`).join("");

  requestAnimationFrame(drawWatermark);
}

function drawWatermark(){
  const canvas=document.getElementById("wmCanvas");
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const vv=window.visualViewport;
  const W=vv?vv.width:window.innerWidth;
  const H=vv?vv.height:window.innerHeight;
  const offsetX=vv?vv.offsetLeft:0;
  const offsetY=vv?vv.offsetTop:0;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  canvas.style.left=offsetX+"px";
  canvas.style.top=offsetY+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const fontSize=Math.max(11,Math.min(14,W/36));
  ctx.font=`400 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
  ctx.fillStyle="rgba(60,60,60,0.35)";
  ctx.textBaseline="middle";
  const spacingX=fontSize*6;
  const spacingY=fontSize*4;
  const angle=-28*Math.PI/180;
  const steps=Math.ceil(Math.sqrt(W*W+H*H)/Math.min(spacingX,spacingY))+4;
  ctx.save(); ctx.translate(W/2,H/2); ctx.rotate(angle);
  for(let row=-steps;row<=steps;row++){
    for(let col=-steps;col<=steps;col++){
      ctx.fillText(DISCORD_USERNAME,col*spacingX,row*spacingY);
    }
  }
  ctx.restore();
}

function guardWatermark(){
  const canvas=document.getElementById("wmCanvas");
  if(!canvas) return;

  let drawing=false;

  const observer=new MutationObserver(mutations=>{
    if(drawing) return;
    for(const mutation of mutations){
      if(mutation.type==='attributes'){
        requestAnimationFrame(drawWatermark);
        break;
      }
    }
  });

  observer.observe(canvas,{
    attributes: true,
    attributeFilter: ['width','height','style','class']
  });

  const originalDraw=drawWatermark;
  window.drawWatermark=function(){
    drawing=true;
    originalDraw();
    requestAnimationFrame(()=>{ drawing=false; });
  };

  setInterval(()=>{
    const c=document.getElementById("wmCanvas");
    if(!c){
      const newCanvas=document.createElement("canvas");
      newCanvas.id="wmCanvas";
      newCanvas.className="wm-canvas";
      const card=document.getElementById("tableCard");
      if(card){ card.appendChild(newCanvas); drawWatermark(); guardWatermark(); }
      return;
    }
    const vv=window.visualViewport;
    const expectedW=(vv?vv.width:window.innerWidth)*(window.devicePixelRatio||1);
    const expectedH=(vv?vv.height:window.innerHeight)*(window.devicePixelRatio||1);
    if(c.width<expectedW*0.5||c.height<expectedH*0.5){
      drawWatermark();
    }
  }, 1000);
}

async function fetchData(){
  document.getElementById("loadMsg").style.display="inline";
  try{
    const resp=await fetch(`/api/restocks?days=${currentWeeks*7}`);
    rawData=await resp.json();
  } catch(e){ rawData=[]; }
  document.getElementById("loadMsg").style.display="none";
  render();
}

function setRegion(r,btn){
  currentRegion=r;
  btn.closest(".btn-group").querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  loadLocations().then(()=>fetchData());
}
function setSlot(v,btn){
  showSlots=v;
  document.getElementById("btnSlot").classList.toggle("active",v);
  document.getElementById("btnDay").classList.toggle("active",!v);
  render();
}

const redraw=()=>requestAnimationFrame(drawWatermark);
window.addEventListener("resize",redraw);
window.addEventListener("scroll",redraw);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',redraw);
  window.visualViewport.addEventListener('scroll',redraw);
}

async function loadRegions(){
  try {
    const resp = await fetch("/api/regions");
    if (!resp.ok) throw new Error("fetch failed");
    REGIONS = await resp.json();
    const group = document.getElementById("regionBtns");
    group.innerHTML = "";
    REGIONS.forEach((r, i) => {
      const btn = document.createElement("button");
      btn.textContent = r.label;
      btn.onclick = function(){ setRegion(r.code, this); };
      if (i === 0) {
        btn.classList.add("active");
        currentRegion = r.code;
      }
      group.appendChild(btn);
    });
  } catch(e) {
    document.getElementById("regionBtns").innerHTML = '<button class="active">Error</button>';
  }
}
loadRegions().then(()=>loadLocations()).then(()=>fetchData());
guardWatermark();
</script>
