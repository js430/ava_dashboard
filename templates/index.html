<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restock Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f4f5;
    color: #111;
    min-height: 100vh;
  }

  /* ---- Header ---- */
  .header {
    background: #fff;
    border-bottom: 1px solid #e4e4e7;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 16px; font-weight: 600; color: #111; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #5865F2; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 600; color: #fff;
    overflow: hidden; flex-shrink: 0;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { font-size: 13px; color: #555; }
  .logout {
    font-size: 12px; color: #888; text-decoration: none;
    padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px;
  }
  .logout:hover { background: #f4f4f5; }

  /* ---- Main ---- */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ---- Controls ---- */
  .controls {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .controls label { font-size: 12px; color: #666; }
  .btn-group { display: flex; gap: 0; }
  .btn-group button {
    font-size: 12px; height: 30px; padding: 0 12px;
    border: 1px solid #ddd; background: #fff; color: #333;
    cursor: pointer; transition: background 0.1s;
  }
  .btn-group button:first-child { border-radius: 6px 0 0 6px; }
  .btn-group button:last-child  { border-radius: 0 6px 6px 0; }
  .btn-group button:not(:first-child) { border-left: none; }
  .btn-group button.active { background: #5865F2; color: #fff; border-color: #5865F2; }
  .divider { width: 1px; height: 20px; background: #e4e4e7; margin: 0 4px; }
  .loading-msg { font-size: 13px; color: #888; }

  /* ---- Region legend ---- */
  .region-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .rl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .rl-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ---- Table card ---- */
  .table-card {
    background: #fff;
    border: 1px solid #e4e4e7;
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .wm-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .table-scroll { overflow-x: auto; }

  table { border-collapse: collapse; font-size: 11px; }
  .loc-cell {
    font-size: 11px; white-space: nowrap;
    padding: 3px 10px 3px 0; text-align: right;
    min-width: 130px;
  }
  .loc-name { color: #111; font-weight: 500; }
  .loc-store { font-size: 10px; color: #999; margin-left: 4px; }
  .region-header td { padding-top: 12px; padding-bottom: 3px; }
  .region-label { font-size: 11px; font-weight: 600; text-align: right; padding-right: 10px; letter-spacing: 0.05em; }
  .col-head { font-size: 10px; color: #888; text-align: center; padding: 2px 1px; min-width: 28px; }
  .sub-head { font-size: 9px; color: #aaa; text-align: center; padding: 1px; }
  .cell {
    width: 28px; height: 24px; text-align: center; vertical-align: middle;
    cursor: default; font-size: 10px; font-weight: 500;
    border-radius: 3px; border: 1px solid transparent;
    transition: border-color 0.1s;
  }
  .cell:hover { border-color: #aaa; }
  .total-head { font-size: 10px; color: #888; text-align: center; padding: 2px 8px; }
  .total-cell { font-size: 11px; font-weight: 600; text-align: center; padding: 0 8px; }

  /* ---- Legend ---- */
  .legend {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; font-size: 11px; color: #888;
  }
  .legend-swatch { width: 18px; height: 11px; border-radius: 2px; }

  /* ---- Tooltip ---- */
  .tip {
    position: fixed; background: #fff;
    border: 1px solid #e4e4e7; border-radius: 8px;
    padding: 6px 10px; font-size: 11px; color: #111;
    pointer-events: none; z-index: 1000; display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    white-space: nowrap;
  }

  /* ---- Empty state ---- */
  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="avatar" id="avatarEl">
      {% if avatar %}
        <img src="https://cdn.discordapp.com/avatars/{{ user_id }}/{{ avatar }}.png" alt="">
      {% else %}
        {{ username[0] | upper }}
      {% endif %}
    </div>
    <div>
      <div class="header h1" style="font-size:16px;font-weight:600;">Restock Dashboard</div>
      <div class="user-info">{{ username }}</div>
    </div>
  </div>
  <a href="/logout" class="logout">Log out</a>
</div>

<div class="main">

  <div class="controls">
    <label>Period:</label>
    <div class="btn-group">
      <button class="active" onclick="setPeriod(7,this)">7 days</button>
      <button onclick="setPeriod(30,this)">30 days</button>
      <button onclick="setPeriod(60,this)">60 days</button>
    </div>
    <div class="divider"></div>
    <label>Time split:</label>
    <div class="btn-group">
      <button id="btnSlot" class="active" onclick="setSlot(true,this)">AM / PM / Eve</button>
      <button id="btnDay" onclick="setSlot(false,this)">Day total</button>
    </div>
    <span class="loading-msg" id="loadMsg" style="display:none;">Loading...</span>
  </div>

  <div class="region-legend" id="regionLegend"></div>

  <div class="table-card" id="tableCard">
    <canvas class="wm-canvas" id="wmCanvas"></canvas>
    <div class="table-scroll">
      <table id="ht"><tr><td class="empty">Loading data...</td></tr></table>
    </div>
  </div>

  <div class="legend">
    <span>None</span>
    <div style="display:flex;gap:2px;" id="legendBar"></div>
    <span>High</span>
  </div>

</div>

<div class="tip" id="tip"></div>

<script>
const DISCORD_USERNAME = {{ username | tojson }};

const REGIONS = [
  { key:"NOVA", label:"Northern Virginia", color:"#185FA5" },
  { key:"MD",   label:"Maryland",          color:"#0F6E56" },
  { key:"DC",   label:"DC",                color:"#854F0B" },
  { key:"RVA",  label:"Central VA",        color:"#993556" },
];
const regionMap = Object.fromEntries(REGIONS.map(r=>[r.key,r]));

const SLOTS    = ["Morning","Afternoon","Evening"];
const SLOT_S   = ["AM","PM","Eve"];
const INTENSITY = [0.07,0.16,0.28,0.42,0.58,0.75,0.92];

let periodDays = 7;
let showSlots  = true;
let rawData    = [];

function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function cellBg(val,max,hex){
  if(val===0)return"#f4f4f5";
  const idx=Math.min(Math.floor((val/max)*(INTENSITY.length-1)),INTENSITY.length-1);
  return hexRgba(hex,INTENSITY[idx]);
}
function cellFg(val,max){ return(val/max)>0.55?"#fff":"#111"; }

function buildDayList(days){
  const list=[];
  const now=new Date();
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);
    d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const label=days<=7
      ? d.toLocaleDateString("en-US",{weekday:"short"})
      : `${d.getMonth()+1}/${d.getDate()}`;
    list.push({key,label});
  }
  return list;
}

function aggregateData(days){
  const dayList=buildDayList(days);
  const dayKeys=new Set(dayList.map(d=>d.key));

  const locs={};
  rawData.forEach(row=>{
    if(!dayKeys.has(row.date))return;
    const k=`${row.location}||${row.store}||${row.region}`;
    if(!locs[k])locs[k]={location:row.location,store:row.store,region:row.region,days:{}};
    if(!locs[k].days[row.date])locs[k].days[row.date]={Morning:0,Afternoon:0,Evening:0};
    locs[k].days[row.date][row.slot]=(locs[k].days[row.date][row.slot]||0)+1;
  });
  return{dayList,locs:Object.values(locs)};
}

function render(){
  const{dayList,locs}=aggregateData(periodDays);

  let maxVal=0;
  locs.forEach(loc=>{
    dayList.forEach(({key})=>{
      const d=loc.days[key]||{Morning:0,Afternoon:0,Evening:0};
      if(showSlots){SLOTS.forEach(sl=>{if(d[sl]>maxVal)maxVal=d[sl];});}
      else{const t=SLOTS.reduce((s,sl)=>s+d[sl],0);if(t>maxVal)maxVal=t;}
    });
  });
  if(maxVal===0)maxVal=1;

  const ht=document.getElementById("ht");

  if(!locs.length){
    ht.innerHTML=`<tr><td class="empty">No restocks found for this period.</td></tr>`;
    drawWatermark();
    return;
  }

  let html="<thead>";
  if(showSlots){
    html+="<tr><th class='loc-cell'></th>";
    dayList.forEach(({label})=>{html+=`<th class='col-head' colspan='3'>${label}</th>`;});
    html+="<th class='total-head'>Total</th></tr>";
    html+="<tr><th class='loc-cell'></th>";
    dayList.forEach(()=>SLOT_S.forEach(s=>{html+=`<th class='sub-head'>${s}</th>`;}));
    html+="<th></th></tr>";
  } else {
    html+="<tr><th class='loc-cell'></th>";
    dayList.forEach(({label})=>{html+=`<th class='col-head'>${label}</th>`;});
    html+="<th class='total-head'>Total</th></tr>";
  }
  html+="</thead><tbody>";

  REGIONS.forEach(region=>{
    const regionLocs=locs.filter(l=>l.region===region.key);
    if(!regionLocs.length)return;
    const hex=region.color;
    const spanCols=showSlots?dayList.length*3:dayList.length;
    html+=`<tr class='region-header'>
      <td class='region-label' style='color:${hex}'>${region.label}</td>
      <td colspan='${spanCols+1}'><div style='height:1px;background:${hexRgba(hex,0.25)};margin-top:10px;'></div></td>
    </tr>`;

    regionLocs.forEach(loc=>{
      let rowTotal=0;
      html+=`<tr><td class='loc-cell'>
        <span class='loc-name'>${loc.location}</span>
        <span class='loc-store'>${loc.store}</span>
      </td>`;

      dayList.forEach(({key,label})=>{
        const d=loc.days[key]||{Morning:0,Afternoon:0,Evening:0};
        if(showSlots){
          SLOTS.forEach(sl=>{
            const v=d[sl];
            rowTotal+=v;
            const bg=cellBg(v,maxVal,hex);
            const fg=cellFg(v,maxVal);
            const tip=`${loc.location} · ${label} ${sl}: ${v} restock${v!==1?"s":""}`;
            html+=`<td class='cell' style='background:${bg};color:${fg}' data-tip='${tip}'>${v>0?v:`<span style='opacity:0.25'>·</span>`}</td>`;
          });
        } else {
          const v=SLOTS.reduce((s,sl)=>s+d[sl],0);
          rowTotal+=v;
          const bg=cellBg(v,maxVal,hex);
          const fg=cellFg(v,maxVal);
          const tip=`${loc.location} · ${label}: ${v} restock${v!==1?"s":""}`;
          html+=`<td class='cell' style='background:${bg};color:${fg}' data-tip='${tip}'>${v>0?v:`<span style='opacity:0.25'>·</span>`}</td>`;
        }
      });
      html+=`<td class='total-cell' style='color:${hex}'>${rowTotal}</td></tr>`;
    });
  });

  html+="</tbody>";
  ht.innerHTML=html;

  ht.querySelectorAll(".cell").forEach(cell=>{
    cell.addEventListener("mouseenter",()=>{
      const tip=document.getElementById("tip");
      tip.textContent=cell.getAttribute("data-tip");
      tip.style.display="block";
    });
    cell.addEventListener("mousemove",e=>{
      const tip=document.getElementById("tip");
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-28)+"px";
    });
    cell.addEventListener("mouseleave",()=>{document.getElementById("tip").style.display="none";});
  });

  document.getElementById("legendBar").innerHTML=
    INTENSITY.map(a=>`<div class='legend-swatch' style='background:rgba(55,138,221,${a})'></div>`).join("");

  requestAnimationFrame(drawWatermark);
}

function drawWatermark(){
  const card=document.getElementById("tableCard");
  const canvas=document.getElementById("wmCanvas");
  const W=card.offsetWidth, H=card.offsetHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);

  const text=DISCORD_USERNAME;
  const fontSize=Math.max(13,Math.min(17,W/30));
  ctx.font=`500 ${fontSize}px -apple-system, sans-serif`;
  ctx.fillStyle="rgba(80,80,80,0.11)";
  ctx.strokeStyle="rgba(255,255,255,0.08)";
  ctx.lineWidth=3;

  const angle=-28*Math.PI/180;
  const spacing=fontSize*7.5;
  const diagLen=Math.sqrt(W*W+H*H);
  const steps=Math.ceil(diagLen/spacing)+2;

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.rotate(angle);
  for(let row=-steps;row<=steps;row++){
    for(let col=-steps;col<=steps;col++){
      ctx.strokeText(text,col*spacing,row*spacing*1.7);
      ctx.fillText(text,col*spacing,row*spacing*1.7);
    }
  }
  ctx.restore();
}

async function fetchData(){
  document.getElementById("loadMsg").style.display="inline";
  try{
    const resp=await fetch(`/api/restocks?days=${periodDays}`);
    rawData=await resp.json();
  } catch(e){
    rawData=[];
  }
  document.getElementById("loadMsg").style.display="none";
  render();
}

function setPeriod(d,btn){
  periodDays=d;
  btn.closest(".btn-group").querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  fetchData();
}
function setSlot(v,btn){
  showSlots=v;
  document.getElementById("btnSlot").classList.toggle("active",v);
  document.getElementById("btnDay").classList.toggle("active",!v);
  render();
}

document.getElementById("regionLegend").innerHTML=
  REGIONS.map(r=>`<div class='rl-item'><div class='rl-dot' style='background:${r.color}'></div>${r.label}</div>`).join("");

window.addEventListener("resize",()=>requestAnimationFrame(drawWatermark));
fetchData();
</script>
</body>
</html>
