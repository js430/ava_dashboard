<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Restock Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #e4e4e7; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 16px; font-weight: 600; color: #111; }
  .header-sub { font-size: 12px; color: #999; margin-top: 1px; }
  .nav { display: flex; gap: 8px; align-items: center; }
  .nav a { font-size: 12px; color: #555; text-decoration: none; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
  .nav a:hover { background: #f4f4f5; }
  .nav a.active { background: #5865F2; color: #fff; border-color: #5865F2; }
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 600; color: #111; }
  .stat-sub { font-size: 11px; color: #aaa; margin-top: 3px; }

  /* Table card */
  .table-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid #e4e4e7; display: flex; align-items: center; justify-content: space-between; }
  .table-header-title { font-size: 14px; font-weight: 600; color: #111; }
  .table-scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  thead th { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; border-bottom: 1px solid #e4e4e7; background: #fafafa; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 10px 16px; color: #333; vertical-align: middle; }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #5865F2; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .username { font-weight: 500; color: #111; }
  .user-id { font-size: 11px; color: #aaa; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .badge-new { background: #e8f5e9; color: #2e7d32; }
  .badge-repeat { background: #e3f2fd; color: #1565c0; }
  .ip { font-family: monospace; font-size: 12px; color: #666; }
  .time { font-size: 12px; color: #555; white-space: nowrap; }
  .time-ago { font-size: 11px; color: #aaa; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-bar input { font-size: 12px; height: 30px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #111; width: 200px; }
  .filter-bar select { font-size: 12px; height: 30px; padding: 0 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #111; }
  .count-label { font-size: 12px; color: #999; }

  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

  @media (max-width: 640px) {
    .header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 12px; }
    .nav { flex-wrap: wrap; gap: 5px; }
    .nav a { font-size: 11px; padding: 3px 7px; }
    .main { padding: 12px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { padding: 10px 12px; }
    .stat-value { font-size: 20px; }
    .table-header { flex-direction: column; gap: 10px; padding: 12px 14px; align-items: flex-start; }
    .filter-bar { width: 100%; }
    .filter-bar input { width: 100%; }
    thead th { padding: 8px 10px; font-size: 10px; }
    tbody td { padding: 8px 10px; font-size: 12px; }
    .user-cell { gap: 8px; }
    .avatar { width: 24px; height: 24px; font-size: 9px; }
    .ip { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">Admin Panel</div>
      <div class="header-sub">Restock Dashboard</div>
    </div>
  </div>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/map">Map</a>
    <a href="/status">Status</a>
    <a href="/scan">Scan</a>
    <a href="/admin" class="active">Admin</a>
    <a href="/contributors">Contributors</a>
    <a href="/logout">Log out</a>
  </div>
</div>

<div class="main">

  <div class="stat-grid" id="statGrid">
    <div class="stat-card"><div class="stat-label">Total logins</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Unique users</div><div class="stat-value" id="statUnique">—</div></div>
    <div class="stat-card"><div class="stat-label">Logins today</div><div class="stat-value" id="statToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Last login</div><div class="stat-value" id="statLast" style="font-size:14px;margin-top:4px;">—</div><div class="stat-sub" id="statLastTime"></div></div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="table-header-title">Login history</div>
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search username..." oninput="filterTable()">
        <select id="limitSelect" onchange="loadSessions()">
          <option value="50">Last 50</option>
          <option value="100" selected>Last 100</option>
          <option value="250">Last 250</option>
          <option value="500">Last 500</option>
        </select>
        <span class="count-label" id="countLabel"></span>
      </div>
    </div>
    <div class="table-scroll">
      <table id="sessionTable">
        <thead>
          <tr>
            <th>User</th>
            <th>Login time</th>
            <th>IP address</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="sessionBody">
          <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let allSessions = [];

function timeAgo(dateStr){
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if(diff < 60) return `${Math.floor(diff)}s ago`;
  if(diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if(diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function formatTime(dateStr){
  return new Date(dateStr).toLocaleString("en-US", {
    month: "short", day: "numeric",
    hour: "numeric", minute: "2-digit",
    hour12: true
  });
}

function isToday(dateStr){
  const d = new Date(dateStr);
  const now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function buildStats(sessions){
  const total = sessions.length;
  const unique = new Set(sessions.map(s=>s.user_id)).size;
  const today = sessions.filter(s=>isToday(s.logged_in_at)).length;
  const last = sessions[0];

  document.getElementById("statTotal").textContent = total.toLocaleString();
  document.getElementById("statUnique").textContent = unique.toLocaleString();
  document.getElementById("statToday").textContent = today.toLocaleString();
  if(last){
    document.getElementById("statLast").textContent = last.username;
    document.getElementById("statLastTime").textContent = timeAgo(last.logged_in_at);
  }
}

function renderTable(sessions){
  const body = document.getElementById("sessionBody");
  if(!sessions.length){
    body.innerHTML = `<tr><td colspan="4" class="empty">No sessions found.</td></tr>`;
    return;
  }

  // Track first-time vs repeat per user within the loaded set
  const seen = new Set();

  body.innerHTML = sessions.map(s=>{
    const isNew = !seen.has(s.user_id);
    seen.add(s.user_id);
    const initials = s.username.slice(0,2).toUpperCase();
    return `<tr>
      <td>
        <div class="user-cell">
          <div class="avatar">${initials}</div>
          <div>
            <div class="username">${s.username}</div>
            <div class="user-id">${s.user_id}</div>
          </div>
        </div>
      </td>
      <td>
        <div class="time">${formatTime(s.logged_in_at)}</div>
        <div class="time-ago">${timeAgo(s.logged_in_at)}</div>
      </td>
      <td><span class="ip">${s.ip_address||"—"}</span></td>
      <td><span class="badge ${isNew?"badge-new":"badge-repeat"}">${isNew?"First visit":"Repeat"}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("countLabel").textContent = `${sessions.length} records`;
}

function filterTable(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = q ? allSessions.filter(s=>s.username.toLowerCase().includes(q)) : allSessions;
  renderTable(filtered);
  document.getElementById("countLabel").textContent = `${filtered.length} of ${allSessions.length}`;
}

async function loadSessions(){
  const limit = document.getElementById("limitSelect").value;
  try{
    const resp = await fetch(`/admin/api?limit=${limit}`);
    if(!resp.ok){ document.getElementById("sessionBody").innerHTML=`<tr><td colspan="4" class="empty">Failed to load sessions.</td></tr>`; return; }
    allSessions = await resp.json();
    buildStats(allSessions);
    renderTable(allSessions);
  } catch(e){
    document.getElementById("sessionBody").innerHTML=`<tr><td colspan="4" class="empty">Error loading data.</td></tr>`;
  }
}

loadSessions();
setInterval(loadSessions, 30000);
</script>
</body>
</html>
