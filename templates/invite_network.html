<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var __t=localStorage.getItem('theme');if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invite Network — Restock Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: #fff; border-bottom: 1px solid #e4e4e7; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 16px; font-weight: 600; color: #111; }
  .header-sub { font-size: 12px; color: #999; margin-top: 1px; }

  .nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .nav a { font-size: 12px; color: #555; text-decoration: none; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; white-space: nowrap; }
  .nav a:hover { background: #f4f4f5; }
  .nav a.active { background: #5865F2; color: #fff; border-color: #5865F2; }

  .main { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 600; color: #111; }

  .graph-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; }
  .graph-toolbar { padding: 12px 16px; border-bottom: 1px solid #e4e4e7; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .graph-toolbar-title { font-size: 14px; font-weight: 600; color: #111; }
  .search-input { font-size: 12px; height: 30px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #111; width: 180px; outline: none; }
  .search-input:focus { border-color: #5865F2; }
  .toolbar-btn { font-size: 12px; height: 30px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #555; cursor: pointer; transition: background 0.1s; white-space: nowrap; }
  .toolbar-btn:hover { background: #f4f4f5; }

  .legend-row { display: flex; align-items: center; gap: 14px; margin-left: auto; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; white-space: nowrap; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #graphContainer { width: 100%; height: 620px; position: relative; background: #fafafa; cursor: grab; }
  #graphContainer:active { cursor: grabbing; }

  .loading-overlay { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 14px; }

  .node-tooltip { position: fixed; background: #fff; border: 1px solid #e4e4e7; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #111; pointer-events: none; z-index: 1000; display: none; box-shadow: 0 4px 14px rgba(0,0,0,0.12); min-width: 160px; line-height: 1.5; }
  .tooltip-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .tooltip-row { color: #666; }

  @media (max-width: 640px) {
    .header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 12px; }
    .nav { gap: 5px; }
    .nav a { font-size: 12px; padding: 3px 7px; }
    .main { padding: 12px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    #graphContainer { height: 420px; }
    .legend-row { display: none; }
  }

  /* ── Theme toggle ── */
  .theme-toggle { display: none; font-size: 16px; background: #f4f4f5; border: 1px solid #ddd; border-radius: 6px; padding: 4px 8px; cursor: pointer; line-height: 1; transition: background 0.15s; flex-shrink: 0; }
  .theme-toggle:hover { background: #e8e8ea; }

  /* ── Dark mode ── */
  html[data-theme="dark"] { color-scheme: dark; }
  html[data-theme="dark"] body { background: #111113; color: #f0f0f0; }
  html[data-theme="dark"] .header { background: #1c1c1f; border-bottom-color: #303033; }
  html[data-theme="dark"] .header-title { color: #f0f0f0; }
  html[data-theme="dark"] .header-sub { color: #888; }
  html[data-theme="dark"] .nav a { background: #252528; border-color: #383838; color: #bbbbc5; }
  html[data-theme="dark"] .nav a:hover { background: #2e2e32; }
  html[data-theme="dark"] .nav a.active { background: #5865F2; color: #fff; border-color: #5865F2; }
  html[data-theme="dark"] .stat-card { background: #1c1c1f; border-color: #303033; }
  html[data-theme="dark"] .stat-label { color: #888; }
  html[data-theme="dark"] .stat-value { color: #f0f0f0; }
  html[data-theme="dark"] .graph-card { background: #1c1c1f; border-color: #303033; }
  html[data-theme="dark"] .graph-toolbar { border-bottom-color: #303033; }
  html[data-theme="dark"] .graph-toolbar-title { color: #f0f0f0; }
  html[data-theme="dark"] .search-input { background: #252528; border-color: #383838; color: #f0f0f0; }
  html[data-theme="dark"] .toolbar-btn { background: #252528; border-color: #383838; color: #bbbbc5; }
  html[data-theme="dark"] .toolbar-btn:hover { background: #2e2e32; }
  html[data-theme="dark"] .legend-item { color: #bbbbc5; }
  html[data-theme="dark"] .theme-toggle { background: #252528; border-color: #383838; color: #e0e0e0; }
  html[data-theme="dark"] .theme-toggle:hover { background: #2e2e32; }
  html[data-theme="dark"] .node-tooltip { background: #1c1c1f; border-color: #303033; color: #f0f0f0; }
  html[data-theme="dark"] .tooltip-row { color: #aaa; }
  html[data-theme="dark"] #graphContainer { background: #161618; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">Invite Network</div>
      <div class="header-sub">Restock Dashboard</div>
    </div>
  </div>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/map">Map</a>
    <a href="/status">Status</a>
    <a href="/scan">Scan</a>
    {% if is_admin %}<a href="/admin">Admin</a>{% endif %}
    {% if is_admin %}<a href="/contributors">Contributors</a>{% endif %}
    <a href="/invite-network" class="active">Network</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Dark mode">🌙</button>
    <a href="/logout">Log out</a>
  </div>
</div>

<div class="main">

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Total members</div>
      <div class="stat-value" id="statMembers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total inviters</div>
      <div class="stat-value" id="statInviters">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top inviter</div>
      <div class="stat-value" id="statTopInviter" style="font-size:14px;margin-top:4px;">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg invites / inviter</div>
      <div class="stat-value" id="statAvgInvites">—</div>
    </div>
  </div>

  <div class="graph-card">
    <div class="graph-toolbar">
      <span class="graph-toolbar-title">Member invite graph</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search user…" oninput="searchUser()">
      <button class="toolbar-btn" onclick="resetView()">Reset view</button>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>20+ invites</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>10–19</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div>5–9</div>
        <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>1–4</div>
        <div class="legend-item"><div class="legend-dot" style="background:#5865F2"></div>0 invites</div>
      </div>
    </div>
    <div id="graphContainer">
      <div class="loading-overlay" id="loadingMsg">Loading graph data…</div>
    </div>
  </div>

</div>

<div class="node-tooltip" id="nodeTooltip"></div>

<script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
<script>
const DISCORD_USERNAME = {{ username | tojson }};

let network = null;
let allNodes = null;
let allEdges = null;
let rawNodes = [];

function isDarkMode() {
  return document.documentElement.getAttribute('data-theme') === 'dark';
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildTooltip(node) {
  const joined = node.joined
    ? new Date(node.joined).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
    : '—';
  return `<div class="tooltip-name">${escHtml(node.label)}</div>
    <div class="tooltip-row">Invites: <strong>${node.invites || 0}</strong></div>
    <div class="tooltip-row">Joined: ${joined}</div>
    <div class="tooltip-row" style="font-size:11px;color:#aaa;margin-top:3px;">${escHtml(node.uid)}</div>`;
}

function darkenHex(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3), 16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5), 16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7), 16) - amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

async function loadGraph() {
  try {
    const resp = await fetch('/api/invite-network');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    rawNodes = data.nodes;

    // ── Stats ──
    const inviters = rawNodes.filter(n => n.invites > 0);
    document.getElementById('statMembers').textContent = rawNodes.length.toLocaleString();
    document.getElementById('statInviters').textContent = inviters.length.toLocaleString();

    const top = [...inviters].sort((a,b) => b.invites - a.invites)[0];
    if (top) document.getElementById('statTopInviter').textContent = `${top.label} (${top.invites})`;

    const totalInvites = inviters.reduce((s, n) => s + n.invites, 0);
    document.getElementById('statAvgInvites').textContent =
      inviters.length > 0 ? (totalInvites / inviters.length).toFixed(1) : '0';

    // ── Remove loading overlay ──
    const loadEl = document.getElementById('loadingMsg');
    if (loadEl) loadEl.remove();

    const dark = isDarkMode();
    const fontColor = dark ? '#ccc' : '#333';
    const edgeColor = dark ? '#383838' : '#d1d5db';

    // ── Vis datasets ──
    allNodes = new vis.DataSet(rawNodes.map(n => ({
      id:      n.id,
      label:   n.label,
      color: {
        background: n.color,
        border: darkenHex(n.color, 30),
        highlight: { background: n.color, border: '#fff' },
        hover:      { background: n.color, border: '#fff' },
      },
      size:    n.size,
      font:    { size: 11, color: fontColor },
      x:       n.x,
      y:       n.y,
      // custom fields for tooltip
      uid:     n.uid,
      invites: n.invites,
      joined:  n.joined,
    })));

    allEdges = new vis.DataSet(data.edges.map(e => ({
      id:     e.id,
      from:   e.from,
      to:     e.to,
      arrows: { to: { enabled: true, scaleFactor: 0.5 } },
      color:  { color: edgeColor, opacity: 0.7 },
      width:  0.8,
      smooth: { type: 'continuous', roundness: 0.15 },
    })));

    const container = document.getElementById('graphContainer');
    const options = {
      nodes: {
        shape: 'dot',
        borderWidth: 1.5,
        shadow: false,
        scaling: { min: 8, max: 30 },
      },
      edges: {
        smooth: { type: 'continuous', roundness: 0.15 },
      },
      physics: { enabled: false },
      interaction: {
        hover: true,
        tooltipDelay: 9999,  // disable built-in tooltip; we use custom
        zoomView: true,
        dragView: true,
        dragNodes: false,
        selectionMarkerColor: 'rgba(88,101,242,0.2)',
      },
      layout: { improvedLayout: false },
    };

    network = new vis.Network(container, { nodes: allNodes, edges: allEdges }, options);

    // ── Custom tooltip ──
    const tooltip = document.getElementById('nodeTooltip');
    network.on('hoverNode', function(params) {
      const node = allNodes.get(params.node);
      if (!node) return;
      tooltip.innerHTML = buildTooltip(node);
      tooltip.style.display = 'block';
    });
    network.on('blurNode', function() {
      tooltip.style.display = 'none';
    });
    document.addEventListener('mousemove', function(e) {
      if (tooltip.style.display !== 'block') return;
      const x = e.clientX + 16;
      const y = e.clientY - 8;
      tooltip.style.left = Math.min(x, window.innerWidth - tooltip.offsetWidth - 10) + 'px';
      tooltip.style.top  = Math.max(y, 10) + 'px';
    });

  } catch(e) {
    const el = document.getElementById('loadingMsg');
    if (el) el.textContent = 'Error loading graph: ' + e.message;
  }
}

function resetView() {
  if (network) {
    network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  }
}

function searchUser() {
  if (!network || !allNodes) return;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  network.unselectAll();
  if (!q) return;
  const matches = allNodes.get({ filter: n => n.label.toLowerCase().includes(q) });
  if (!matches.length) return;
  const ids = matches.map(n => n.id);
  network.selectNodes(ids);
  if (ids.length === 1) {
    network.focus(ids[0], { scale: 1.5, animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
  } else {
    network.fit({ nodes: ids, animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
  }
}

loadGraph();

// ── Theme toggle ──
(function() {
  var btn = document.getElementById('themeToggle');
  function upd() {
    if (!btn) return;
    var dark = isDarkMode();
    btn.textContent = dark ? '☀️' : '🌙';
    btn.title = dark ? 'Light mode' : 'Dark mode';
  }
  window.toggleTheme = function() {
    var dark = isDarkMode();
    var next = dark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    upd();
    // Update graph colors
    if (allNodes && allEdges) {
      var fontColor  = next === 'dark' ? '#ccc' : '#333';
      var edgeColor  = next === 'dark' ? '#383838' : '#d1d5db';
      allNodes.forEach(function(n) {
        allNodes.update({ id: n.id, font: { size: 11, color: fontColor } });
      });
      allEdges.forEach(function(e) {
        allEdges.update({ id: e.id, color: { color: edgeColor, opacity: 0.7 } });
      });
    }
  };
  upd();
})();
</script>
</body>
</html>
